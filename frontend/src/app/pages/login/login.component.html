<div class="auth-page">
      <div class="auth-card fade-in">
        <div class="auth-header">
          <span class="auth-icon">🚌</span>
          <h1>Welcome back</h1>
          <p>Sign in to your BusGo account</p>
        </div>

        <form (ngSubmit)="onLogin()" class="auth-form">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-input" [(ngModel)]="username" name="username"
                   placeholder="Enter your username" required>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" [(ngModel)]="password" name="password"
                   placeholder="Enter your password" required>
          </div>

          <div *ngIf="error" class="error-msg">{{ error }}</div>

          <button type="submit" class="btn-primary-custom w-100" [disabled]="loading">
            <span *ngIf="loading" class="spinner"></span>
            {{ loading ? 'Signing in...' : 'Sign In' }}
          </button>
        </form>

        <p class="auth-footer">
          Don't have an account? <a routerLink="/signup">Sign up</a>
        </p>
      </div>
    </div>
