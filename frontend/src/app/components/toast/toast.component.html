<div class="toast-container">
  <div *ngFor="let t of toasts; let i = index"
       class="toast-item"
       [ngClass]="'toast-' + t.type"
       (click)="remove(i)">
    <app-icon *ngIf="t.type==='success'" name="check" [size]="18"></app-icon>
    <app-icon *ngIf="t.type==='error'" name="x-mark" [size]="18"></app-icon>
    <app-icon *ngIf="t.type==='info'" name="info" [size]="18"></app-icon>
    {{ t.message }}
  </div>
</div>
